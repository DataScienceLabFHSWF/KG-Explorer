services:
  neo4j:
    image: neo4j:5.26.0-community
    container_name: fusion-neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/fusion2026
      NEO4J_PLUGINS: '["graph-data-science", "apoc", "n10s"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      # Allow n10s (neosemantics) and APOC procedures to run unrestricted
      NEO4J_dbms_security_procedures_unrestricted: "n10s.*,apoc.*,gds.*"
      # Allow file:// imports from the mapped import directory
      NEO4J_dbms_security_allow__csv__import__from__file__urls: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # Mount project output/ as the Neo4j import dir so n10s can read the TTL
      - ./output:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Qdrant — vector store for KnowledgeGraphBuilder chunk retrieval ──────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fusion-qdrant
    ports:
      - "6333:6333"   # REST API + dashboard at /dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Fuseki — SPARQL/ontology store for KnowledgeGraphBuilder ─────────────
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fusion-fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: fusion2026
      JVM_ARGS: "-Xmx1g"
    volumes:
      - fuseki_data:/fuseki
      # Mount our ontology so it's available inside the container
      - ./output:/fuseki/import:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Ollama runs locally (not in Docker).
  # Start it with:  ollama serve
  # Pull the model: ollama pull gemma4:e2b
  # For KGB embeddings also pull: ollama pull nomic-embed-text

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  fuseki_data:
